# Zonas de rate limiting — definidas no contexto http{} e
# referenciadas em cada server{} via:
#   include /etc/nginx/conf.d/ratelimit.conf;

# Zona geral: 100 req/min por IP (uso normal de aplicação web)
limit_req_zone  $binary_remote_addr zone=general:10m rate=100r/m;

# Zona para endpoints de API (mais restritiva): 30 req/min por IP
limit_req_zone  $binary_remote_addr zone=api:10m    rate=30r/m;

# Limite de conexões simultâneas por IP
limit_conn_zone $binary_remote_addr zone=addr:10m;

# Aplicação padrão: zona general com burst tolerante
limit_req  zone=general burst=20 nodelay;
limit_conn addr 20;

# Retorna 429 em vez de 503 ao exceder o limite
limit_req_status  429;
limit_conn_status 429;
