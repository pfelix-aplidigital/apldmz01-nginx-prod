# Headers de segurança incluídos em cada server{} via:
#   include /etc/nginx/conf.d/security-headers.conf;

# HSTS: 2 anos, incluindo subdomínios, elegível para preload
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# Evita que o browser renderize em frames externos
add_header X-Frame-Options "SAMEORIGIN" always;

# Previne MIME-type sniffing
add_header X-Content-Type-Options "nosniff" always;

# Proteção XSS legada (navegadores antigos)
add_header X-XSS-Protection "1; mode=block" always;

# Controla informações de referência enviadas
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# CSP restritiva — ajustar se o backend servir assets externos
add_header Content-Security-Policy "default-src 'self'; frame-ancestors 'none'; base-uri 'self';" always;

# Desabilita funcionalidades de browser não necessárias
add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
