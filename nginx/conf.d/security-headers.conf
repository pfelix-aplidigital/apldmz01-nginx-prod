# Headers de segurança incluídos em cada server{} via:
#   include /etc/nginx/conf.d/security-headers.conf;
#
# NOTA: CSP removido intencionalmente — os apps Imperva (SecureSphere, DSF, WAF etc.)
# usam JavaScript inline que é bloqueado por "default-src 'self'". Cada backend
# gerencia seu próprio CSP. proxy.conf usa proxy_hide_header para evitar duplicatas.

# HSTS: 2 anos — o nginx é o terminador TLS, portanto é quem deve enviar isso
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# Os headers abaixo substituem os do backend (proxy_hide_header em proxy.conf)
# para garantir valor consistente e evitar duplicatas no response.
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
