# Parâmetros TLS globais — incluído em cada server{} via:
#   include /etc/nginx/conf.d/ssl-params.conf;

# Apenas TLS 1.2 e 1.3 (SSLv3, TLS 1.0 e 1.1 descontinuados)
ssl_protocols TLSv1.2 TLSv1.3;

# Ciphers modernos ordenados por segurança/performance
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;

# Deixa o cliente escolher (melhor para TLS 1.3 e dispositivos móveis)
ssl_prefer_server_ciphers off;

# Cache de sessão SSL compartilhado entre workers
ssl_session_cache   shared:SSL:10m;
ssl_session_timeout 1d;

# Desabilita session tickets (forward secrecy perfeita)
ssl_session_tickets off;

# Parâmetros DH para DHE ciphers — gerado em install-nginx.sh
# ssl_dhparam /etc/nginx/dhparam.pem;

# OCSP Stapling — reduz latência de verificação de revogação
ssl_stapling        on;
ssl_stapling_verify on;
resolver            8.8.8.8 8.8.4.4 valid=300s;
resolver_timeout    5s;
