# Headers e configurações padrão de proxy reverso.
# Incluir em cada location{} via:
#   include /etc/nginx/snippets/proxy.conf;

proxy_http_version 1.1;

# Headers que identificam o cliente real para o backend
proxy_set_header Host               $host;
proxy_set_header X-Real-IP          $remote_addr;
proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto  $scheme;
proxy_set_header X-Forwarded-Host   $host;
proxy_set_header X-Forwarded-Port   $server_port;

# Necessário para WebSockets e keep-alive no upstream
proxy_set_header Connection         "";
proxy_set_header Upgrade            $http_upgrade;

# Timeouts
proxy_connect_timeout 10s;
proxy_send_timeout    60s;
proxy_read_timeout    60s;

# Buffers — evita que o NGINX espere o backend completar antes de enviar ao cliente
proxy_buffering       on;
proxy_buffers         8 16k;
proxy_buffer_size     32k;
proxy_busy_buffers_size 64k;

# Não propaga cabeçalhos internos do backend para o cliente
proxy_hide_header X-Powered-By;
proxy_hide_header Server;
