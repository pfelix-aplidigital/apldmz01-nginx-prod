# Headers e configurações padrão de proxy reverso.
# Incluir em cada location{} via:
#   include /etc/nginx/snippets/proxy.conf;

proxy_http_version 1.1;

# Headers que identificam o cliente real para o backend
proxy_set_header Host               $host;
proxy_set_header X-Real-IP          $remote_addr;
proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto  $scheme;
proxy_set_header X-Forwarded-Host   $host;
proxy_set_header X-Forwarded-Port   $server_port;

# WebSocket: Connection e Upgrade definidos no location{} de cada site via
# proxy_set_header Connection $connection_upgrade (requer map em nginx.conf)

# Timeouts e buffers definidos per-site no site.conf.j2 (consoles precisam de mais tempo)

# Remove headers internos do backend
proxy_hide_header X-Powered-By;
proxy_hide_header Server;

# Evita duplicatas: esses headers já são enviados pelo nginx via security-headers.conf
proxy_hide_header X-Content-Type-Options;
proxy_hide_header Strict-Transport-Security;

# Deixa o backend controlar seu próprio CSP, X-Frame-Options e XSS-Protection
# (removidos de security-headers.conf para não quebrar apps com JS inline)
